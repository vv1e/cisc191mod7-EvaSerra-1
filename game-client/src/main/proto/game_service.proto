syntax = "proto3";

option java_multiple_files = true;
option java_package = "edu.sdccd.cisc191.grpc";
option java_outer_classname = "GameProto";

service GameService {
  rpc JoinMatch(JoinMatchRequest) returns (JoinMatchResponse);
  rpc PlayMatch(PlayMatchRequest) returns (MatchResultResponse);
  rpc LoadMatchHistory(MatchHistoryRequest) returns (MatchHistoryResponse);
}

message JoinMatchRequest {
  string player_name = 1;
  string difficulty = 2;
  bool ranked = 3;
}

message JoinMatchResponse {
  string match_id = 1;
  string player_name = 2;
  string opponent_name = 3;
  string message = 4;
  // TODO 5: Add a server-created summary field here.
  string summary = 5;
}

message PlayMatchRequest {
  string match_id = 1;
  string player_name = 2;
}

message MatchResultResponse {
  string match_id = 1;
  string winner_name = 2;
  string loser_name = 3;
  string message = 4;
  bool player_won = 5;
}

message MatchHistoryRequest {
  string player_name = 1;
}

message MatchHistoryResponse {
  repeated string matches = 1;
}
